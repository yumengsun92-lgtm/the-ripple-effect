<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1520" viewBox="0 0 1200 1520" role="img" aria-labelledby="title desc">
  <title id="title">The Ripple Effect mindmap</title>
  <desc id="desc">A hand-drawn style mindmap centered on care, with branches to dialogue, relations, diversity, community, and tensions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .line {
        fill: none;
        stroke: #111111;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrow);
      }
      .circle {
        fill: #ffffff;
        stroke: #111111;
        stroke-width: 8;
      }
      .main {
        font-family: "Bradley Hand", "Marker Felt", "Comic Sans MS", cursive;
        fill: #111111;
        text-anchor: middle;
      }
      .hand {
        font-family: "Bradley Hand", "Marker Felt", "Comic Sans MS", cursive;
        fill: #111111;
      }
      .note {
        font-family: "Bradley Hand", "Marker Felt", "Comic Sans MS", cursive;
        fill: #111111;
      }
    </style>
  </defs>

  <rect class="bg" width="1080" height="1400" rx="24" />

  <path class="line" d="M520 630 C420 520, 330 450, 250 395" />
  <path class="line" d="M560 620 C655 505, 735 430, 810 360" />
  <path class="line" d="M605 700 C730 690, 835 700, 955 705" />
  <path class="line" d="M530 770 C530 860, 530 930, 530 1015" />
  <path class="line" d="M470 730 C355 805, 255 855, 155 900" />

  <circle class="circle" cx="535" cy="700" r="92" />
  <text class="main" x="535" y="690" font-size="78">Care</text>
  <text class="main" x="535" y="758" font-size="38">♥ ♥</text>

  <text class="hand" x="96" y="410" font-size="86" transform="rotate(-26 96 410)">question</text>
  <text class="hand" x="130" y="525" font-size="84" transform="rotate(-18 130 525)">+ dialogue</text>
  <text class="hand" x="190" y="160" font-size="84" transform="rotate(-14 190 160)">curiosity</text>

  <text class="hand" x="665" y="122" font-size="68" transform="rotate(-6 665 122)">human + more</text>
  <text class="hand" x="678" y="194" font-size="68" transform="rotate(-4 678 194)">than human</text>
  <text class="hand" x="705" y="410" font-size="84" transform="rotate(-7 705 410)">cultivate</text>
  <text class="hand" x="640" y="505" font-size="96" transform="rotate(-4 640 505)">Relations</text>

  <text class="hand" x="790" y="650" font-size="82" transform="rotate(-5 790 650)">welcoming</text>
  <text class="hand" x="730" y="758" font-size="82" transform="rotate(-5 730 758)">difference/</text>
  <text class="hand" x="760" y="852" font-size="82" transform="rotate(-5 760 852)">diversity</text>

  <text class="hand" x="55" y="960" font-size="82" transform="rotate(-16 55 960)">embrace</text>
  <text class="hand" x="120" y="1065" font-size="82" transform="rotate(-12 120 1065)">tensions</text>

  <text class="hand" x="405" y="1135" font-size="90">Community</text>

  <text class="note" x="72" y="1258" font-size="68">Care as a form of resistance that</text>
  <text class="note" x="92" y="1340" font-size="68">creates opening to explore otherwise</text>
  <text class="note" x="90" y="1422" font-size="68">onto-epistemological possibilities!</text>
</svg>
